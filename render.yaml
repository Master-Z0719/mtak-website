services:
  - type: web
    name: mtak-site
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m waitress --host 0.0.0.0 --port $PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: MTAK_DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: mtak-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
